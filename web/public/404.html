<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Board Not Found | PachinkoMaster</title>
  <meta name="description" content="Page not found — head back to the PachinkoMaster and drop some balls." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://www.pachinko.choice/" />
  <meta name="theme-color" content="#0d0d1a" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e8e0f0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    /* animated peg grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(245,200,66,0.18) 2px, transparent 2px);
      background-size: 38px 38px;
      animation: drift 12s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes drift {
      from { background-position: 0 0; }
      to   { background-position: 38px 76px; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(22, 18, 40, 0.92);
      border: 1px solid rgba(245,200,66,0.3);
      border-radius: 16px;
      padding: 48px 40px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 0 40px rgba(245,200,66,0.12), 0 8px 32px rgba(0,0,0,0.6);
    }

    .ball {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffd966, #f5c842 60%, #b8860b);
      box-shadow: 0 0 30px rgba(245,200,66,0.6);
      margin: 0 auto 24px;
      animation: bounce 1.4s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0);   }
      50%       { transform: translateY(14px); }
    }

    .code {
      font-family: 'Orbitron', 'Courier New', monospace;
      font-size: clamp(56px, 14vw, 80px);
      font-weight: 700;
      color: #f5c842;
      text-shadow: 0 0 20px rgba(245,200,66,0.6);
      line-height: 1;
      letter-spacing: 0.05em;
    }

    .title {
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 700;
      color: #00e5ff;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 12px 0 8px;
      text-shadow: 0 0 10px rgba(0,229,255,0.4);
    }

    .sub {
      font-size: 14px;
      color: rgba(232,224,240,0.6);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .home-btn {
      display: inline-block;
      background: linear-gradient(135deg, #f5c842, #e6a817);
      color: #0d0d1a;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 13px 32px;
      border-radius: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(245,200,66,0.35);
    }
    .home-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(245,200,66,0.5);
    }
    .home-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="ball"></div>
    <div class="code">404</div>
    <div class="title">Board Not Found</div>
    <p class="sub">
      Looks like this ball fell off the board.<br>
      The page you're after doesn't exist.
    </p>
    <a href="/" class="home-btn">🎰 Back to the Machine</a>
  </div>
</body>
</html>
